<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Lookzi virtual try-on studio">
  <title>Lookzi</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: #101828;
      background: #f7f8fb;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 72px 24px;
    }
    h1 {
      font-size: 56px;
      line-height: 1;
      margin: 0 0 18px;
    }
    p {
      color: #475467;
      font-size: 18px;
      line-height: 1.6;
      max-width: 680px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    a {
      color: inherit;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d0d5dd;
      background: white;
      border-radius: 8px;
      padding: 12px 16px;
      text-decoration: none;
      font-weight: 600;
    }
    .button.primary {
      background: #111827;
      border-color: #111827;
      color: white;
    }

      margin-top: 80px;
      font-size: 13px;
      color: #667085;
    }
  </style>
</head>
<body>
  <main>
    <h1>Lookzi</h1>
    <p>
      A virtual try-on studio for previewing garments on person images. Run it on a CUDA GPU
      for fast generation, or use Google Colab for quick testing.
    </p>
    <div class="actions">
      <a class="button primary" href="https://github.com/Mohamed-Kudratov/Lookzi">Open Repository</a>
      <a class="button" href="COLAB_GPU_SETUP.md">Colab Setup</a>

    <footer>
      Non-commercial research/demo use. Includes upstream open-source virtual try-on work under its original license.
    </footer>
  </main>

</html>
